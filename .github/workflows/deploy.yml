name: Deploy Law Search

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: ghcr.io/parkhyunchang/law-search
  CRAWLER_IMAGE: ghcr.io/parkhyunchang/law-search-crawler
  CONTAINER_NAME: law_search
  CRAWLER_NAME: law_crawler
  HOST_PORT: 3600

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 이 앱은 의존성/빌드 산출물이 없는 순수 Node 앱이라
      # Docker 이미지가 소스를 그대로 복사해 실행한다. (npm build 단계 불필요)

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push law-search image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push crawler image
        uses: docker/build-push-action@v5
        with:
          context: ./crawler
          push: true
          tags: ${{ env.CRAWLER_IMAGE }}:latest
          cache-from: type=gha,scope=crawler
          cache-to: type=gha,mode=max,scope=crawler

      - name: Deploy to NAS via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.NAS_HOST }}
          username: ${{ secrets.NAS_USER }}
          password: ${{ secrets.NAS_SSH_PASSWORD }}
          script: |
            DOCKER=/usr/local/bin/docker

            # ghcr.io 로그인
            echo "${{ secrets.GHCR_PAT }}" | $DOCKER login ghcr.io -u parkhyunchang --password-stdin

            # 최신 이미지 Pull (앱 + 크롤러)
            $DOCKER pull ${{ env.IMAGE_NAME }}:latest
            $DOCKER pull ${{ env.CRAWLER_IMAGE }}:latest

            # [네트워크] Synology 사용자 정의 브리지에서는 컨테이너 간(node↔crawler)
            # 통신이 호스트 방화벽/FORWARD 규칙 때문에 드롭된다(연결 timeout).
            # → 두 컨테이너를 모두 host 네트워크로 띄우고 localhost 로 통신한다.
            #   - 크롤러: HOST=127.0.0.1 로 바인딩 → LAN 비노출(내부 전용 유지)
            #   - 앱: 호스트 ${HOST_PORT} 를 직접 listen, 크롤러는 127.0.0.1:8000 호출

            # ── 크롤러 컨테이너 (호스트 루프백 전용, 외부 미노출) ──
            $DOCKER stop ${{ env.CRAWLER_NAME }} || true
            $DOCKER rm ${{ env.CRAWLER_NAME }} || true
            $DOCKER run -d \
              --name ${{ env.CRAWLER_NAME }} \
              --restart unless-stopped \
              --network host \
              -e HOST=127.0.0.1 \
              -e PORT=8000 \
              ${{ env.CRAWLER_IMAGE }}:latest

            # ── 앱 컨테이너 (호스트 ${HOST_PORT} 직접 listen) ──
            $DOCKER stop ${{ env.CONTAINER_NAME }} || true
            $DOCKER rm ${{ env.CONTAINER_NAME }} || true
            $DOCKER run -d \
              --name ${{ env.CONTAINER_NAME }} \
              --restart unless-stopped \
              --network host \
              -e PORT=${{ env.HOST_PORT }} \
              -e CRAWLER_URL=http://127.0.0.1:8000 \
              ${{ env.IMAGE_NAME }}:latest

            # 미사용 이미지 정리
            $DOCKER image prune -f
